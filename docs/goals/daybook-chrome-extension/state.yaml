# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Daybook Chrome Extension"
  slug: "daybook-chrome-extension"
  kind: existing_plan
  tranche: "Validate the supplied build pack, then complete successive safe verified Daybook implementation packages until v1 is complete."
  status: done
  oracle:
    signal: "A local Daybook Chrome extension build passes its tests and checks, loads unpacked as the Chrome new tab page with zero permissions and zero network requests, and a final Judge or PM audit maps the verified behavior to acceptance criteria A1-A20 from /Users/tonym/Downloads/daybook-build-pack-v1.md."
    cadence: "after each Worker package and at final audit"
    final_proof: "Receipt-backed tests, checks, extension walkthrough evidence, chrome://extensions zero-permissions evidence, network-panel zero-request evidence, and A1-A20 audit with full_outcome_complete: true."
  intake:
    original_request: "Use GoalBuddy goal prep for the Daybook build pack."
    interpreted_outcome: "Prepare a GoalBuddy board that preserves the Daybook build pack and enables safe autonomous implementation."
    input_shape: existing_plan
    audience: "Toli"
    authority: requested
    proof_type: demo
    completion_proof: "All A1-A20 acceptance criteria pass against a local unpacked Chrome extension with no requested permissions and no network requests."
    likely_misfire: "Shipping a generic note app scaffold or editor demo while missing the new-tab extension behavior, zero-permissions constraint, timeline model, right-panel modes, mirror behavior, performance targets, or A1-A20 proof."
    blind_spots_considered:
      - "New tab focus and paint timing can differ from dev-server behavior."
      - "The CodeMirror live preview and static markdown renderer can drift visually."
      - "Optional file mirror must stay off by default and never become a silent sync service."
      - "A pleasant scaffold is not complete unless the extension is verified in Chrome as the new tab page."
    existing_plan_facts:
      - "Source plan: /Users/tonym/Downloads/daybook-build-pack-v1.md."
      - "Daybook replaces the Chrome new tab page with a daily markdown notepad."
      - "The center timeline is the product: today opens at the top with focus, future placeholders scroll upward, and past empty days are omitted unless jumped to."
      - "The left rail provides a quiet calendar, blue content dots, noted-day jumps, today, and settings."
      - "The right side supports scratchpad, master list, per-day margin, and hidden modes; switching modes must never destroy content."
      - "The editor is CodeMirror 6 source-mode markdown with live preview, task checkboxes, list continuation, syntax concealment, links, quotes, code, and static-render parity."
      - "Storage is local-first: Dexie over IndexedDB, BroadcastChannel sync, JSON export/import, and an optional File System Access mirror that is off by default."
      - "The folder mirror is one-way app-to-files in v1, writes plain markdown files, never deletes files, and handles permission loss softly."
      - "Manifest V3 uses only chrome_url_overrides.newtab with no background worker, no content scripts, no permissions, no telemetry, and no network requests."
      - "Stack: Vite, React 18+, TypeScript strict, Tailwind v4, CodeMirror 6, Dexie, markdown-it, and local bundled assets."
      - "Performance targets: shell first paint under 100ms, today's content under 150ms, and first keystroke in today's note under 200ms on a warm profile."
      - "Design direction: quiet paper, one blue accent, all colors and sizes from CSS tokens, no gradients, no heavy shadows, no decorative motion."
      - "Milestones M1-M7 and acceptance criteria A1-A20 define v1 completion."
      - "The v1.1 backlog, including full-text search and mirror read-back, is out of scope for v1."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
